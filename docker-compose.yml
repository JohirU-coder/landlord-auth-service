version: '3.9'

services:
  auth-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rentreviews_auth
      # Replace these secrets before use — never commit real values
      JWT_SECRET: dev-jwt-secret-change-me-min-32-chars
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5500
      ADMIN_SECRET: dev-admin-secret-change-me
      # RESEND_API_KEY: your-key-here  # omit for dev console logging
      # FROM_EMAIL: RentReviews <noreply@rentreviews.com>
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rentreviews_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  postgres_data:
