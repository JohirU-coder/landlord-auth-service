name: Dependency Upgrade

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1' # weekly on Monday 04:00 UTC

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Install npm-check-updates
        run: npm install -g npm-check-updates

      - name: Run npm-check-updates and upgrade package.json
        run: |
          ncu -u
          cat package.json | jq '{name: .name, version: .version, dependencies: .dependencies, devDependencies: .devDependencies}'

      - name: Install updated deps
        run: npm install || true

      - name: Prepare test DB
        run: |
          if [ -f scripts/setup_test_db.js ]; then npm run db:setup:test || true; fi

      - name: Run tests
        run: npm run test:ci
        continue-on-error: true

      - name: Debug branch and repo state
        run: |
          echo '--- git status ---'
          git status --short
          echo '--- git branch ---'
          git branch --show-current
          echo '--- git remote -v ---'
          git remote -v
          echo '--- git log last 3 ---'
          git log -3 --oneline
          echo '--- git rev-parse HEAD ---'
          git rev-parse HEAD
          echo '--- package files ---'
          ls -1 package.json package-lock.json || true

      - name: Create PR with dependency upgrades
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): upgrade dependencies via npm-check-updates"
          branch: "chore/deps-upgrade-${{ github.run_id }}"
          base: main
          title: "chore(deps): automated dependency upgrades"
          body: |
            This PR upgrades dependencies using `npm-check-updates`.
            Please review, run CI, and merge if acceptable.
          labels: dependencies, automated-pr
          update-existing: true
          delete-branch: true
