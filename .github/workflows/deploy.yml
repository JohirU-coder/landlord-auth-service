name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rentreviews_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rentreviews_test
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Wait for Postgres
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          for i in $(seq 1 30); do pg_isready -h localhost -p 5432 && break || sleep 1; done
      - name: Prepare test database schema
        run: npm run db:setup:test
      - name: Run test suite
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      FRONTEND_API_BASE_URL: ${{ secrets.FRONTEND_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Generate frontend runtime config
        run: |
          cat > rentreviews-platform/rentreviews-platform/rentreviews-platform/frontend/landlord-frontend/config.js <<'EOF'
          // Generated at deploy time by GitHub Actions.
          window.APP_CONFIG = window.APP_CONFIG || {
            API_BASE_URL: "${{ env.FRONTEND_API_BASE_URL || 'http://localhost:8080' }}"
          };
          EOF
      - name: Show generated config preview
        run: |
          echo '--- config.js contents ---'
          sed -n '1,20p' rentreviews-platform/rentreviews-platform/rentreviews-platform/frontend/landlord-frontend/config.js

      - name: Deploy via SSH
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_PATH != '' && env.SSH_PRIVATE_KEY != '' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openssh-client rsync
          mkdir -p ~/.ssh
          echo "${{ env.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ env.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
          rsync -avz --delete rentreviews-platform/rentreviews-platform/rentreviews-platform/ "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}"
      - name: Deploy skipped
        if: ${{ env.DEPLOY_HOST == '' || env.DEPLOY_USER == '' || env.DEPLOY_PATH == '' || env.SSH_PRIVATE_KEY == '' }}
        run: |
          echo 'Skipping SSH deployment because one or more required secrets are not configured:'
          echo '  DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH, SSH_PRIVATE_KEY'
