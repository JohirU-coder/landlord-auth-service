name: Auto Audit Fix

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1' # weekly on Monday at 03:00 UTC

jobs:
  audit-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit fix
        run: |
          npm audit fix || true

      - name: Run db setup (if present)
        run: |
          if [ -f scripts/setup_test_db.js ]; then npm run db:setup:test || true; fi

      - name: Run tests
        run: npm run test:ci
        continue-on-error: true

      - name: Debug branch and repo state
        run: |
          echo '--- git status ---'
          git status --short
          echo '--- git branch ---'
          git branch --show-current
          echo '--- git remote -v ---'
          git remote -v
          echo '--- git log last 3 ---'
          git log -3 --oneline
          echo '--- git rev-parse HEAD ---'
          git rev-parse HEAD
          echo '--- package files ---'
          ls -1 package.json package-lock.json || true

      - name: Create PR if lockfile changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): run npm audit fix and update lockfile"
          branch: "chore/deps-fix"
          title: "chore(deps): automated audit fixes"
          body: |
            This PR was opened automatically by the Auto Audit Fix workflow.
            It runs `npm audit fix` and updates `package-lock.json`/`package.json` where applicable.
          labels: dependency, automated-pr
          update-existing: true
          delete-branch: true
